<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Immunity</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #020108;
  font-family: sans-serif;
  overflow: hidden;
}

/* ── TOP BAR (outside canvas, never overlaps maze) ── */
#topbar {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 6px 12px;
  background: #0a0505;
  border-bottom: 1px solid rgba(200,120,40,0.2);
  flex-wrap: wrap;
}

.pill {
  background: rgba(8,4,1,0.85);
  border: 0.5px solid rgba(200,120,40,0.3);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 13px;
  color: #d08840;
  white-space: nowrap;
}

.topbtn {
  background: #a06015;
  border: none;
  border-radius: 8px;
  padding: 4px 10px;
  color: #100700;
  cursor: pointer;
  font-size: 13px;
  white-space: nowrap;
}

/* ── MAZE AREA ── */
#mc {
  flex: 1 1 0;
  position: relative;
  overflow: hidden;
  cursor: default;
}

canvas { display: block; width: 100%; height: 100%; }

/* ── WIN OVERLAY ── */
#wo {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(4,2,1,0.9);
}

#wb {
  background: #160c04;
  border: 1px solid #a06015;
  border-radius: 12px;
  padding: 30px 44px;
  text-align: center;
}

#wb h2 { color: #f0c060; font-size: 26px; margin-bottom: 10px; }
#wb p  { color: #b07838; margin-bottom: 20px; }
#wb button {
  background: #a06015;
  border: none;
  padding: 8px 20px;
  border-radius: 8px;
  cursor: pointer;
}

/* ── HINT ── */
#hint {
  position: absolute;
  bottom: 6px;
  width: 100%;
  text-align: center;
  font-size: 11px;
  color: rgba(170,110,40,0.35);
  pointer-events: none;
}

/* ── D-PAD OVERLAY ── */
#dpad {
  position: absolute;
  bottom: 30px;
  right: 20px;
  display: none;          /* toggled by JS */
  user-select: none;
  touch-action: none;
}

.dpad-row {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin: 2px 0;
}

.dpad-btn {
  width: 52px;
  height: 52px;
  background: rgba(160,96,21,0.75);
  border: 1px solid rgba(255,180,60,0.4);
  border-radius: 10px;
  font-size: 22px;
  color: #f0d070;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}

.dpad-btn:active,
.dpad-btn.pressed {
  background: rgba(220,140,30,0.9);
}

/* drag handle */
#dpad-handle {
  text-align: center;
  font-size: 11px;
  color: rgba(200,150,50,0.5);
  margin-bottom: 2px;
  cursor: grab;
}
#dpad-handle:active { cursor: grabbing; }
</style>
</head>

<body>

<!-- TOP BAR — sits above the canvas, never overlaps it -->
<div id="topbar">
  <div class="pill" id="sp">Steps: 0</div>
  <div class="pill" id="tp">Time: 0s</div>
  <button class="topbtn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
  <button class="topbtn" id="dpadToggle" onclick="toggleDpad()">🕹 D-Pad</button>
</div>

<!-- MAZE CANVAS -->
<div id="mc">
  <canvas id="cv"></canvas>

  <!-- WIN OVERLAY -->
  <div id="wo">
    <div id="wb">
      <h2>YOU WIN IMMUNITY!</h2>
      <p id="ws"></p>
      <button onclick="restart()">Play again</button>
    </div>
  </div>

  <!-- HINT -->
  <div id="hint">WASD / Arrow Keys · Swipe on mobile</div>

  <!-- D-PAD (draggable overlay) -->
  <div id="dpad">
    <div id="dpad-handle">⠿ drag</div>
    <div class="dpad-row">
      <div class="dpad-btn" id="btn-up"   data-dir="up">▲</div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn" id="btn-left"  data-dir="left">◀</div>
      <div class="dpad-btn" id="btn-down"  data-dir="down">▼</div>
      <div class="dpad-btn" id="btn-right" data-dir="right">▶</div>
    </div>
  </div>
</div>

// ================== CORE ==================
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const mc  = document.getElementById('mc');

const ROWS = 40, COLS = 40;
let CELL = 18;

const START_COL = 19;
const EXIT_COL  = 20;

let player, startTime, steps, won, torch;
let keys={}, lastMove=0;
const MOVE_DELAY = 120;

// ================= TORCH RADIUS =================
// Fixed pixel radius in "logical" pixels — unaffected by zoom/scale.
// We express it relative to CELL so it scales with tile size instead.
const TORCH_CELLS = 9; // visibility radius in cells

// ================= INIT =================
function init(){
  player    = { r:0, c:START_COL };
  startTime = Date.now();
  steps     = 0;
  won       = false;
  torch     = {x:0, y:0};

  document.getElementById('wo').style.display = 'none';
  document.getElementById('sp').textContent   = 'Steps: 0';
  document.getElementById('tp').textContent   = 'Time: 0s';

  requestAnimationFrame(loop);
}
window.restart = init;

// ================= FULLSCREEN =================
function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

// ================= D-PAD TOGGLE & DRAG =================
let dpadVisible = false;
function toggleDpad(){
  dpadVisible = !dpadVisible;
  const dp = document.getElementById('dpad');
  dp.style.display = dpadVisible ? 'block' : 'none';
  document.getElementById('dpadToggle').textContent = dpadVisible ? '✕ D-Pad' : '🕹 D-Pad';
}

// D-pad dragging
(function(){
  const dp     = document.getElementById('dpad');
  const handle = document.getElementById('dpad-handle');
  let dragging = false, ox=0, oy=0, startX=0, startY=0;

  function onStart(ex,ey){
    dragging = true;
    const rect = dp.getBoundingClientRect();
    startX = ex; startY = ey;
    ox = rect.left; oy = rect.top;
    dp.style.right  = '';
    dp.style.bottom = '';
    dp.style.left   = ox + 'px';
    dp.style.top    = oy + 'px';
  }
  function onMove(ex,ey){
    if(!dragging) return;
    dp.style.left = (ox + ex - startX) + 'px';
    dp.style.top  = (oy + ey - startY) + 'px';
  }
  function onEnd(){ dragging = false; }

  handle.addEventListener('mousedown',  e=>{ e.preventDefault(); onStart(e.clientX,e.clientY); });
  document.addEventListener('mousemove', e=>onMove(e.clientX,e.clientY));
  document.addEventListener('mouseup',   onEnd);

  handle.addEventListener('touchstart', e=>{ e.preventDefault(); onStart(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
  document.addEventListener('touchmove', e=>{ if(dragging){ e.preventDefault(); onMove(e.touches[0].clientX,e.touches[0].clientY); } },{passive:false});
  document.addEventListener('touchend',  onEnd);
})();

// D-pad button presses (touch + mouse, continuous hold)
(function(){
  const dirMap = { up:['N',-1,0], down:['S',1,0], left:['W',0,-1], right:['E',0,1] };
  const held = {};
  let interval = null;

  function pressDir(dir){
    if(held[dir]) return;
    held[dir] = true;
    const [d,dr,dc] = dirMap[dir];
    tryMove(dr,dc,d);
    if(!interval) interval = setInterval(()=>{
      const active = Object.keys(held);
      if(active.length) { const [d2,dr2,dc2]=dirMap[active[0]]; tryMove(dr2,dc2,d2); }
    }, MOVE_DELAY);
  }
  function releaseDir(dir){ delete held[dir]; if(!Object.keys(held).length){ clearInterval(interval); interval=null; } }

  document.querySelectorAll('.dpad-btn').forEach(btn=>{
    const dir = btn.dataset.dir;
    btn.addEventListener('mousedown',  e=>{ e.preventDefault(); pressDir(dir); btn.classList.add('pressed'); });
    btn.addEventListener('touchstart', e=>{ e.preventDefault(); pressDir(dir); btn.classList.add('pressed'); },{passive:false});
    ['mouseup','mouseleave'].forEach(ev=>btn.addEventListener(ev, ()=>{ releaseDir(dir); btn.classList.remove('pressed'); }));
    ['touchend','touchcancel'].forEach(ev=>btn.addEventListener(ev, ()=>{ releaseDir(dir); btn.classList.remove('pressed'); }));
  });
})();

// ================= RESIZE =================
function resize(){
  cv.width  = mc.clientWidth;
  cv.height = mc.clientHeight;
  CELL = Math.floor(Math.min(cv.width / COLS, cv.height / ROWS));
}

function off(){
  return {
    ox: (cv.width  - COLS*CELL) / 2,
    oy: (cv.height - ROWS*CELL) / 2
  };
}

// ================= MOVEMENT =================
function canMove(r,c,dir){
  return r>=0 && r<ROWS && c>=0 && c<COLS && !MAZE_WALLS[r][c][dir];
}

function tryMove(dr,dc,dir){
  if(won) return;
  if(canMove(player.r,player.c,dir)){
    player.r+=dr; player.c+=dc; steps++;
    document.getElementById('sp').textContent = 'Steps: '+steps;
    if(player.r===ROWS-1 && player.c===EXIT_COL){
      won = true;
      const e = Math.round((Date.now()-startTime)/1000);
      document.getElementById('ws').textContent = `Steps: ${steps} | Time: ${e}s`;
      document.getElementById('wo').style.display = 'flex';
    }
  }
}

// ================= INPUT =================
document.addEventListener('keydown', e=>{ keys[e.key]=true; });
document.addEventListener('keyup',   e=>{ keys[e.key]=false; });

// ================= SWIPE =================
let swipeX=0, swipeY=0;
mc.addEventListener('touchstart', e=>{ swipeX=e.touches[0].clientX; swipeY=e.touches[0].clientY; },{passive:true});
mc.addEventListener('touchend',   e=>{
  const dx=e.changedTouches[0].clientX-swipeX, dy=e.changedTouches[0].clientY-swipeY;
  if(Math.max(Math.abs(dx),Math.abs(dy))<20) return;
  if(Math.abs(dx)>Math.abs(dy)) tryMove(0,dx>0?1:-1,dx>0?'E':'W');
  else                          tryMove(dy>0?1:-1,0,dy>0?'S':'N');
},{passive:true});

// ================= LOOP =================
function loop(ts=0){
  if(!won){
    if(ts-lastMove>MOVE_DELAY){
      if     (keys['ArrowUp']  ||keys['w']){ tryMove(-1,0,'N'); lastMove=ts; }
      else if(keys['ArrowDown']||keys['s']){ tryMove(1,0,'S');  lastMove=ts; }
      else if(keys['ArrowLeft']||keys['a']){ tryMove(0,-1,'W'); lastMove=ts; }
      else if(keys['ArrowRight']||keys['d']){ tryMove(0,1,'E'); lastMove=ts; }
    }
    resize();
    drawScene(ts);
    requestAnimationFrame(loop);
  } else {
    resize();
    drawScene(ts);
  }
}

// ================= DRAW =================
function drawScene(ts){
  ctx.clearRect(0,0,cv.width,cv.height);
  const {ox,oy} = off();

  // Player centre in canvas px
  const px = ox + player.c*CELL + CELL/2;
  const py = oy + player.r*CELL + CELL/2;
  torch.x += (px - torch.x)*0.18;
  torch.y += (py - torch.y)*0.18;

  // Torch radius scales with CELL so visibility feels the same regardless of zoom/tile size
  const flickerA    = 0.82 + 0.13*Math.sin(ts*0.003+0.7);
  const flickerB    = 1.0  + 0.12*Math.sin(ts*0.0071);
  const torchRadius = TORCH_CELLS * CELL * flickerA * flickerB;

  // Ambient glow
  const grad = ctx.createRadialGradient(torch.x,torch.y,2,torch.x,torch.y,torchRadius);
  grad.addColorStop(0,   'rgba(255,200,80,0.28)');
  grad.addColorStop(0.3, 'rgba(220,120,30,0.18)');
  grad.addColorStop(0.65,'rgba(120,50,10,0.09)');
  grad.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,cv.width,cv.height);

  // Draw cells
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const x=ox+c*CELL, y=oy+r*CELL;
    const cx2=x+CELL/2, cy2=y+CELL/2;
    const dist = Math.hypot(cx2-torch.x, cy2-torch.y);
    const vis  = Math.max(0,Math.min(1,1-(dist-40)/(torchRadius*0.85)));
    if(vis<0.02) continue;
    ctx.save(); ctx.globalAlpha=vis;

    // Floor
    ctx.fillStyle='#c8a878'; ctx.fillRect(x,y,CELL,CELL);
    // Ripple
    ctx.strokeStyle='rgba(160,120,60,0.25)'; ctx.lineWidth=0.5;
    const ly=y+6; ctx.beginPath();
    ctx.moveTo(x+2,ly);
    ctx.bezierCurveTo(x+CELL*0.3,ly+2,x+CELL*0.7,ly-2,x+CELL-2,ly);
    ctx.stroke();

    const cell = MAZE_WALLS[r][c];
    const drawBamboo=(bx,by,h,w)=>{
      const segs=3, segH=h/segs;
      for(let s=0;s<segs;s++){
        const sy=by-s*segH;
        const g=ctx.createLinearGradient(bx,sy,bx+w,sy);
        g.addColorStop(0,'#3d6e20'); g.addColorStop(0.4,'#6aab35');
        g.addColorStop(0.7,'#4e8a28'); g.addColorStop(1,'#2e5015');
        ctx.fillStyle=g; ctx.fillRect(bx,sy-segH,w,segH-1);
        ctx.fillStyle='#2a4010'; ctx.fillRect(bx,sy-1.5,w,3);
      }
      ctx.fillStyle='#1a2c08'; ctx.fillRect(bx-1,by-h,w+2,2);
    };

    ctx.strokeStyle='#5a3a10'; ctx.lineWidth=5; ctx.lineCap='round';
    if(cell.N){ ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+CELL,y);ctx.stroke();
      const n=((r*17+c*7)%3)+2; for(let i=0;i<n;i++) drawBamboo(x+4+i*((CELL-8)/n),y,16,4); }
    if(cell.S){ ctx.beginPath();ctx.moveTo(x,y+CELL);ctx.lineTo(x+CELL,y+CELL);ctx.stroke(); }
    if(cell.W){ ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+CELL);ctx.stroke();
      const n=((r*11+c*13)%3)+2; for(let i=0;i<n;i++) drawBamboo(x,y+4+i*((CELL-8)/n),16,4); }
    if(cell.E){ ctx.beginPath();ctx.moveTo(x+CELL,y);ctx.lineTo(x+CELL,y+CELL);ctx.stroke(); }
    ctx.restore();
  }

  // Goal shrine
  const gx = ox + EXIT_COL * CELL;
  const gy = oy + (ROWS-1)  * CELL;
  const gdist = Math.hypot(gx+CELL/2-torch.x, gy+CELL/2-torch.y);
  const gvis  = Math.max(0,Math.min(1,1-(gdist-40)/(torchRadius*0.85)));
  if(gvis>0.02){
    ctx.save(); ctx.globalAlpha=gvis;
    const pulse=0.7+0.3*Math.sin(ts*0.005);
    const eg=ctx.createRadialGradient(gx+CELL/2,gy+CELL/2,2,gx+CELL/2,gy+CELL/2,CELL*0.6);
    eg.addColorStop(0,`rgba(255,220,80,${0.6*pulse})`); eg.addColorStop(1,'rgba(255,160,0,0)');
    ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(gx+CELL/2,gy+CELL/2,CELL*0.6,0,Math.PI*2); ctx.fill();
    ctx.font=`bold ${Math.round(CELL*0.55)}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=`rgba(255,215,50,${0.85*pulse})`; ctx.fillText('⛩',gx+CELL/2,gy+CELL/2);
    ctx.restore();
  }

  // Player (torch bearer)
  const tx=ox+player.c*CELL, ty=oy+player.r*CELL;
  ctx.save();
  const flamePulse=0.9+0.1*Math.sin(ts*0.008);

  const torchGlow=ctx.createRadialGradient(tx+CELL/2,ty+CELL*0.4,1,tx+CELL/2,ty+CELL*0.4,CELL*0.5);
  torchGlow.addColorStop(0,'rgba(255,190,60,0.7)');
  torchGlow.addColorStop(1,'rgba(200,80,10,0)');
  ctx.fillStyle=torchGlow; ctx.beginPath(); ctx.arc(tx+CELL/2,ty+CELL*0.4,CELL*0.5,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#8B5E10'; ctx.fillRect(tx+CELL/2-2,ty+CELL*0.38,4,CELL*0.45);

  const flX=tx+CELL/2, flY=ty+CELL*0.38;
  const fw=7*flamePulse, fh=10*flamePulse;
  ctx.beginPath(); ctx.moveTo(flX,flY);
  ctx.bezierCurveTo(flX-fw,flY-fh*0.4,flX-fw*0.5,flY-fh,flX,flY-fh);
  ctx.bezierCurveTo(flX+fw*0.5,flY-fh,flX+fw,flY-fh*0.4,flX,flY);
  const fg=ctx.createLinearGradient(flX,flY,flX,flY-fh);
  fg.addColorStop(0,'rgba(255,80,0,0.9)');
  fg.addColorStop(0.5,'rgba(255,180,30,0.95)');
  fg.addColorStop(1,'rgba(255,240,180,1)');
  ctx.fillStyle=fg; ctx.fill();
  ctx.restore();

  // Darkness vignette
  const darkmask=ctx.createRadialGradient(torch.x,torch.y,torchRadius*0.55,torch.x,torch.y,torchRadius*1.3);
  darkmask.addColorStop(0,'rgba(0,0,0,0)');
  darkmask.addColorStop(1,'rgba(5,2,8,0.96)');
  ctx.fillStyle=darkmask; ctx.fillRect(0,0,cv.width,cv.height);

  document.getElementById('tp').textContent = 'Time: '+Math.round((Date.now()-startTime)/1000)+'s';
}

init();
</script>
</body>
